name: Playwright E2E — Stripe Sandbox

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  security-events: write   # required to upload SARIF results to GitHub Code Scanning

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  #  Job 1 — Build the Docker image and run all Playwright tests inside it.
  #           Artifacts (allure-results, traces) are extracted via volume mounts.
  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: Build image & run Playwright tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # BuildKit enables layer caching, parallel stages, and better build output.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build the image and store layers in the GitHub Actions cache.
      # On subsequent runs only changed layers are rebuilt — much faster.
      - name: Build Docker image (with GHA layer cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false   # we only need the image locally for this job
          load: true    # load the built image into the local Docker daemon
          tags: stripe-playwright:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Restore the Allure trend history so reports show pass/fail trends over time.
      - name: Restore Allure history cache
        uses: actions/cache@v4
        with:
          path: allure-history
          key: allure-history-${{ github.run_id }}
          restore-keys: |
            allure-history-

      # Create host-side output directories and seed historical Allure data.
      - name: Prepare output directories & seed Allure history
        run: |
          mkdir -p allure-results test-results playwright-report
          if [ -d allure-history ]; then
            cp -R allure-history/history allure-results/history || true
          fi

      # Run the full test suite inside the container.
      # Secrets are passed as env vars (not inlined in the command) so they
      # are never echoed in the workflow log.
      # Volume mounts let the host access test outputs after the container exits.
      - name: Run Playwright tests in Docker container
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          STRIPE_DASHBOARD_EMAIL: ${{ secrets.STRIPE_DASHBOARD_EMAIL }}
          STRIPE_DASHBOARD_PASSWORD: ${{ secrets.STRIPE_DASHBOARD_PASSWORD }}
        run: |
          docker run --rm \
            --user root \
            -e STRIPE_SECRET_KEY \
            -e STRIPE_PUBLISHABLE_KEY \
            -e STRIPE_DASHBOARD_EMAIL \
            -e STRIPE_DASHBOARD_PASSWORD \
            -e CI=true \
            -v "${{ github.workspace }}/allure-results:/app/allure-results" \
            -v "${{ github.workspace }}/test-results:/app/test-results" \
            stripe-playwright:${{ github.sha }}
        continue-on-error: true   # always upload the report even when tests fail

      # Generate the Allure HTML report on the host (not inside Docker) so the
      # resulting files are immediately available for GitHub Pages upload.
      - name: Install Allure CLI
        run: npm i -g allure-commandline

      - name: Generate Allure HTML report
        run: allure generate ./allure-results --clean -o ./allure-report

      # Persist the Allure history folder so the next run can show trend data.
      - name: Save Allure history for next run
        run: |
          rm -rf allure-history
          mkdir -p allure-history
          cp -R allure-report/history allure-history/history || true

      - name: Upload Allure report (artifact)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report
          retention-days: 30

      - name: Upload Playwright traces (artifact)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-traces
          path: test-results
          retention-days: 14

      # Only upload the Pages artifact on main — we don't want every PR to
      # overwrite the public report.
      - name: Upload GitHub Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

  # ────────────────────────────────────────────────────────────────────────────
  #  Job 2 — Security scanning (runs in parallel with Job 1).
  #
  #  Three scan surfaces:
  #    A) Snyk: npm dependency CVEs
  #    B) Snyk: SAST static-analysis of source code
  #    C) Snyk: Docker container / base-image CVEs
  #    D) Docker Scout: Docker image CVEs (independent second opinion)
  #
  #  Severity filter: critical, high, medium only — no low/informational noise.
  #
  #  Outputs:
  #    • SARIF files  → uploaded to GitHub Code Scanning (Security tab)
  #    • JSON files   → uploaded as the "security-reports" artifact.
  #                     Feed these JSON files directly to an AI tool to get
  #                     prioritised, copy-paste-ready remediation steps.
  #
  #  Required secrets:
  #    SNYK_TOKEN         — from app.snyk.io › Account Settings › Auth Token
  #    DOCKERHUB_USERNAME — your Docker Hub username
  #    DOCKERHUB_TOKEN    — Docker Hub personal access token (read-only scope)
  # ────────────────────────────────────────────────────────────────────────────
  security-scan:
    name: Security scanning — Snyk + Docker Scout
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node.js setup ──────────────────────────────────────────────────────
      # Snyk needs node_modules present to resolve the dependency graph.
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      # ── Snyk CLI install ───────────────────────────────────────────────────
      - name: Set up Snyk CLI
        uses: snyk/actions/setup@master

      # ── A. Snyk: npm dependency scan ──────────────────────────────────────
      # Checks every package in node_modules against Snyk's vulnerability DB.
      # --json-file-output  → machine-readable JSON for AI remediation
      # --sarif-file-output → SARIF for GitHub Code Scanning inline annotations
      # continue-on-error   → exit code 1 means "issues found" — we want the
      #                        report regardless; don't fail the whole job.
      - name: Snyk — npm dependency scan (critical / high / medium)
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk test \
            --severity-threshold=medium \
            --json-file-output=snyk-deps.json \
            --sarif-file-output=snyk-deps.sarif

      # ── B. Snyk: SAST code scan ────────────────────────────────────────────
      # Static analysis of JavaScript source for security anti-patterns
      # (e.g. injection, hard-coded secrets, insecure regex).
      # Note: requires "Snyk Code" to be enabled in your Snyk organisation.
      - name: Snyk — SAST source-code scan (critical / high / medium)
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk code test \
            --severity-threshold=medium \
            --sarif-file-output=snyk-code.sarif

      # ── Build the Docker image for container scanning ──────────────────────
      # Both Snyk container and Docker Scout need the image in the local daemon.
      # cache-from pulls any already-cached layers from the GHA cache written
      # by Job 1 (whichever job ran first wins the cache write).
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image for security scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: stripe-playwright:scan-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── C. Snyk: Docker container scan ────────────────────────────────────
      # Scans the image layers AND the Dockerfile instructions for CVEs and
      # misconfigurations (e.g. running as root, exposed secrets).
      - name: Snyk — Docker container scan (critical / high / medium)
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk container test \
            stripe-playwright:scan-${{ github.sha }} \
            --file=Dockerfile \
            --severity-threshold=medium \
            --json-file-output=snyk-container.json \
            --sarif-file-output=snyk-container.sarif

      # ── D. Docker Scout: CVE scan ──────────────────────────────────────────
      # Docker Scout uses a different vulnerability database (Docker's own +
      # NVD) giving a second independent opinion on the image.
      # We run Scout twice: once for SARIF (GitHub Code Scanning) and once for
      # JSON (AI-friendly artifact) — the two formats cannot be emitted in a
      # single Scout invocation.
      - name: Log in to Docker Hub (required by Docker Scout)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Scout — CVE scan SARIF (critical / high / medium)
        continue-on-error: true
        uses: docker/scout-action@v1
        with:
          command: cves
          image: local://stripe-playwright:scan-${{ github.sha }}
          only-severities: critical,high,medium
          sarif-file: docker-scout-cves.sarif
          summary: true

      - name: Docker Scout — CVE scan JSON for AI remediation (critical / high / medium)
        continue-on-error: true
        uses: docker/scout-action@v1
        with:
          command: cves
          image: local://stripe-playwright:scan-${{ github.sha }}
          only-severities: critical,high,medium
          format: json
          output: docker-scout-cves.json

      # ── Upload SARIF to GitHub Code Scanning ───────────────────────────────
      # SARIF results appear in: repo → Security tab → Code scanning alerts.
      # Each category creates a separate alert group so findings are easy to
      # distinguish by source tool.
      # hashFiles() guard prevents the upload action from failing when a scan
      # step errored before it could write its output file.
      - name: Upload Snyk dep SARIF → GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('snyk-deps.sarif') != ''
        with:
          sarif_file: snyk-deps.sarif
          category: snyk-dependencies

      - name: Upload Snyk code SARIF → GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('snyk-code.sarif') != ''
        with:
          sarif_file: snyk-code.sarif
          category: snyk-code

      - name: Upload Snyk container SARIF → GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('snyk-container.sarif') != ''
        with:
          sarif_file: snyk-container.sarif
          category: snyk-container

      - name: Upload Docker Scout SARIF → GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('docker-scout-cves.sarif') != ''
        with:
          sarif_file: docker-scout-cves.sarif
          category: docker-scout

      # ── Upload all reports as a single downloadable artifact ───────────────
      # To use with an AI tool for remediation:
      #   1. Download the "security-reports" artifact from the Actions run page.
      #   2. Unzip it.
      #   3. Open your AI tool (e.g. Claude Code) and paste the JSON content
      #      with the prompt: "Here are my security scan results. Prioritise
      #      the findings and give me step-by-step remediation for each."
      #   The JSON format is structured — the AI can map CVE IDs to exact
      #   package versions and generate the precise npm/apt commands to fix them.
      - name: Upload security reports artifact (JSON + SARIF for AI remediation)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            snyk-deps.json
            snyk-deps.sarif
            snyk-code.sarif
            snyk-container.json
            snyk-container.sarif
            docker-scout-cves.json
            docker-scout-cves.sarif
          retention-days: 30

  # ────────────────────────────────────────────────────────────────────────────
  #  Job 3 — Publish the Allure report to GitHub Pages (main branch only).
  # ────────────────────────────────────────────────────────────────────────────
  deploy-pages:
    name: Deploy Allure report to GitHub Pages
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
